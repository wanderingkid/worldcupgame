<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .error { color: red; font-weight: bold; background: #fee; padding: 10px; border: 1px solid red; }
    </style>
</head>
<body>
    <div id="status" class="container"></div> <div id="bracket-grid" class="container"></div>

    <script>
    // Initialize Supabase ONLY ONCE
    const supabase = supabase.createClient('https://yvkbmelrvdfdjlbanciv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0');

    async function loadData() {
        try {
            const { data, error } = await supabase.from('matches').select('*').order('id');
            if (error) throw error;
            
            const grid = document.getElementById('bracket-grid');
            if (grid) {
                grid.innerHTML = data.map(m => `
                    <div class="card">
                        <small>${m.round_name}</small>
                        <h3>${m.home_team || 'TBD'} vs ${m.away_team || 'TBD'}</h3>
                        <p>Result: ${m.home_score ?? '-'} - ${m.away_score ?? '-'}</p>
                    </div>
                `).join('');
            }
        } catch (e) {
            console.error("Data Load Error:", e);
        }
    }

    // Run it
    loadData();
</script>
</body>
</html>
