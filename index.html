<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WC 2026 Prediction</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; text-align: center; padding: 20px; }
        .bracket { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .match-card { background: white; padding: 15px; border-radius: 10px; border: 2px solid #2A398D; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        #admin-panel { display: none; margin: 30px auto; padding: 20px; background: #eee; border: 1px solid #ccc; max-width: 600px; }
        input { width: 40px; padding: 5px; }
    </style>
</head>
<body>
    <h1>🏆 FIFA WORLD CUP 2026</h1>
    <div id="bracket" class="bracket">Loading matches...</div>

    <hr style="margin: 40px 0;">
    <button onclick="unlockAdmin()">Admin Login</button>
    <div id="admin-panel">
        <h3>Admin Control Panel</h3>
        <div id="admin-match-list"></div>
    </div>

    <script>
        const supabase = supabase.createClient('https://yvkbmelrvdfdjlbanciv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0');

        async function load() {
            const { data, error } = await supabase.from('matches').select('*');
            if (error) { console.error(error); document.getElementById('bracket').innerText = "Error loading matches"; return; }
            
            document.getElementById('bracket').innerHTML = data.map(m => `
                <div class="match-card">
                    <small>${m.round_name}</small><br>
                    <strong>${m.home_team} vs ${m.away_team}</strong><br>
                    ${m.home_score !== null ? `<p>RESULT: ${m.home_score}-${m.away_score}</p>` : 
                      `<input id="h_${m.id}" type="number" placeholder="H"> 
                       <input id="a_${m.id}" type="number" placeholder="A">
                       <button onclick="save(${m.id})">Predict</button>`}
                </div>
            `).join('');
        }

        async function save(id) {
            const name = prompt("Enter your name:");
            if(!name) return;
            const h = document.getElementById('h_'+id).value;
            const a = document.getElementById('a_'+id).value;
            await supabase.from('predictions').insert({ player_name: name, match_id: id, pred_home: h, pred_away: a });
            alert("Prediction Saved!");
            location.reload();
        }

        function unlockAdmin() {
            if(prompt("Enter Password:") === "worldcup2026") {
                document.getElementById('admin-panel').style.display = 'block';
                loadAdmin();
            }
        }

        async function loadAdmin() {
            const { data } = await supabase.from('matches').select('*');
            document.getElementById('admin-match-list').innerHTML = data.map(m => `
                <div style="margin-bottom:10px;">${m.home_team} vs ${m.away_team}: 
                <input id="ah_${m.id}" type="number" value="${m.home_score || 0}">
                <input id="aa_${m.id}" type="number" value="${m.away_score || 0}">
                <button onclick="updateScore(${m.id})">Update</button></div>
            `).join('');
        }

        async function updateScore(id) {
            const h = document.getElementById('ah_'+id).value;
            const a = document.getElementById('aa_'+id).value;
            await supabase.from('matches').update({ home_score: h, away_score: a }).eq('id', id);
            alert("Result Updated!");
            location.reload();
        }

        load();
    </script>
</body>
</html>
