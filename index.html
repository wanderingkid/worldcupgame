<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0B0F19; 
            --card: rgba(22, 30, 49, 0.7); 
            --card-hover: rgba(30, 41, 67, 0.9);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(59, 130, 246, 0.5);
            --text-main: #F8FAFC; 
            --text-muted: #64748B;
            --accent: #2563EB; 
            --accent-glow: rgba(37, 99, 235, 0.4);
            --danger: #EF4444; 
            --winner-bg: rgba(16, 185, 129, 0.1);
            --winner-text: #10B981;
        }

        body { 
            font-family: 'Space Grotesk', system-ui, sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1E2640 0%, var(--bg) 70%); 
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh;
        }

        /* Premium Navigation */
        .nav { 
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.25rem; 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tab { 
            cursor: pointer; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif;
            color: var(--text-muted); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            position: relative;
            padding: 4px 8px;
        }
        
        .tab:hover { color: var(--text-main); }
        .tab.active { 
            color: #FFFFFF; 
            text-shadow: 0 0 10px var(--accent-glow);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -21px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--accent);
            box-shadow: 0 -2px 10px var(--accent);
        }

        .container { 
            max-width: 1400px; 
            margin: 2.5rem auto; 
            padding: 0 1.5rem; 
        }

        /* Bracket View Layout */
        .bracket-wrapper {
            display: flex;
            gap: 2.5rem;
            overflow-x: auto;
            padding: 1rem 0;
            align-items: center;
            justify-content: flex-start;
        }

        .bracket-column {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            min-width: 280px;
            flex: 1;
        }

        .column-header {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 0.5rem;
        }

        /* Match Cards */
        .match-card { 
            background: var(--card); 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .match-card:hover {
            border-color: var(--border-active);
            box-shadow: 0 4px 25px rgba(37, 99, 235, 0.15);
            transform: translateY(-2px);
        }

        .match-id-badge {
            font-size: 0.7rem;
            color: var(--text-muted);
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.2);
            border-bottom: 1px solid var(--border);
            font-weight: bold;
        }

        .team-row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 12px 16px;
            font-weight: 700; 
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }
        .team-row:last-child { border-bottom: none; }
        
        .team-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }
        .team-row.tbd .team-name { color: var(--text-muted); font-weight: 500; }

        /* Scoring and Penalties */
        .score-display {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .penalty-badge {
            font-size: 0.75rem;
            color: #A7F3D0;
            background: rgba(16, 185, 129, 0.2);
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 800;
        }

        .team-row.winner {
            background: var(--winner-bg);
            color: var(--winner-text);
        }

        /* Forms Layout */
        .admin-section-title {
            font-family: 'Montserrat', sans-serif;
            margin-top: 5rem;
            border-top: 1px solid var(--border);
            padding-top: 3rem;
            font-size: 1.5rem;
        }

        .standard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 1.5rem;
        }

        .form-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.25rem;
        }

        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .score-input { 
            width: 45px; 
            padding: 8px; 
            border: 1px solid var(--border); 
            border-radius: 6px; 
            text-align: center; 
            background: rgba(0, 0, 0, 0.4);
            color: #FFFFFF;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
        }
        .score-input:focus { border-color: var(--accent); outline: none; }
        .score-input::placeholder { color: rgba(255,255,255,0.2); }

        button { 
            padding: 10px 14px; 
            border-radius: 8px; 
            border: none; 
            font-weight: 700; 
            cursor: pointer; 
            font-family: 'Montserrat', sans-serif;
            font-size: 0.8rem;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn-primary { background: var(--accent); color: white; width: 100%; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover { transform: translateY(-1px); background: #1d4ed8; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); width: 100%; margin-top: 6px; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

        input[type="text"] {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            padding: 10px;
            color: white;
            border-radius: 8px;
            width: 100%;
            max-width: 300px;
            font-family: inherit;
        }
    </style>
</head>
<body>

    <div class="nav">
        <div class="tab active" onclick="showTab('dashboard', this)">🏆 Bracket</div>
        <div class="tab" onclick="showTab('predict', this)">✍️ Predictions</div>
        <div class="tab" onclick="showTab('leaderboard', this)">📈 Leaderboard</div>
    </div>

    <div id="dashboard" class="container">
        <div class="bracket-wrapper" id="bracket-canvas"></div>

        <h2 class="admin-section-title">⚙️ Score Update</h2>
        <div class="standard-grid" id="admin-grid"></div>
    </div>

    <div id="predict" class="container" style="display:none">
        <h2>✍         <h2>✍️ Submit Predictions</h2>
        <div style="margin-bottom: 2rem;">
            <input type="text" id="player-name" placeholder="Enter Player Name">
        </div>
        <div class="standard-grid" id="predict-grid"></div>
    </div>

    <div id="leaderboard" class="container" style="display:none">
        <h2>📈 Leaderboard Standings</h2>
        <div class="form-card" id="leaderboard-card"></div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION VARIABLES - INSERT SUPABASE KEYS
        // ==========================================
        const CONFIG_URL = 'https://yvkbmelrvdfdjlbanciv.supabase.co'; 
        const CONFIG_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0
'; 
        
        const db = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
        let allMatches = [];

        function showTab(id, el) {
            document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
            document.getElementById('predict').style.display = (id === 'predict') ? 'block' : 'none';
            document.getElementById('leaderboard').style.display = (id === 'leaderboard') ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        async function initializeApp() {
            const { data } = await db.from('matches').select('*').order('id');
            allMatches = data || [];
            renderUI();
        }

        // Standardized helper function for rendering structural column match blocks cleanly
        function cleanMatchBlock(m) {
            const homeIsWinner = m.winner_team && m.winner_team === m.home_team;
            const awayIsWinner = m.winner_team && m.winner_team === m.away_team;
            
            return `
                <div class="match-card">
                    <div class="match-id-badge">MATCH ID ${m.id}</div>
                    <div class="team-row ${!m.home_team ? 'tbd' : ''} ${homeIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.home_team || 'TBD'}</span>
                        <span class="score-display">
                            ${m.home_score ?? '-'}
                            ${(m.home_pen !== null && m.home_pen !== undefined && m.home_pen !== '') ? `<span class="penalty-badge">PK: ${m.home_pen}</span>` : ''}
                        </span>
                    </div>
                    <div class="team-row ${!m.away_team ? 'tbd' : ''} ${awayIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.away_team || 'TBD'}</span>
                        <span class="score-display">
                            ${m.away_score ?? '-'}
                            ${(m.away_pen !== null && m.away_pen !== undefined && m.away_pen !== '') ? `<span class="penalty-badge">PK: ${m.away_pen}</span>` : ''}
                        </span>
                    </div>
                </div>
            `;
        }

        function renderUI() {
            // Split up array pools systematically to maintain our tree structure grid columns
            const r16 = allMatches.filter(m => m.id >= 1 && m.id <= 8);
            const qf = allMatches.filter(m => m.id >= 9 && m.id <= 12);
            const sf = allMatches.filter(m => m.id >= 13 && m.id <= 14);
            const f = allMatches.filter(m => m.id === 15);
            const tp = allMatches.filter(m => m.id === 16);

            // 1. Build Structural Horizontal Tree Bracket View
            document.getElementById('bracket-canvas').innerHTML = `
                <div class="bracket-column"><div class="column-header">Round of 16</div>${r16.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Quarter Finals</div>${qf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Semi Finals</div>${sf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column">
                    <div class="column-header">Finals</div>${f.map(cleanMatchBlock).join('')}
                    <div class="column-header" style="margin-top: 2rem;">3rd Place Match</div>${tp.map(cleanMatchBlock).join('')}
                </div>
            `;

            // 2. Render Management Control Panel Cards
            document.getElementById('admin-grid').innerHTML = allMatches.map(m => `
                <div class="form-card">
                    <div class="match-id-badge" style="background:transparent; padding:0 0 8px 0; margin-bottom:8px;">${m.round_name} (ID: ${m.id})</div>
                    <div class="input-row">
                        <span class="team-name">${m.home_team || 'TBD'}</span>
                        <div>
                            <input type="number" id="h-${m.id}" class="score-input" placeholder="FT" value="${m.home_score ?? ''}">
                            <input type="number" id="hp-${m.id}" class="score-input" style="border-color:rgba(16,185,129,0.3)" placeholder="PK" value="${m.home_pen ?? ''}">
                        </div>
                    </div>
                    <div class="input-row">
                        <span class="team-name">${m.away_team || 'TBD'}</span>
                        <div>
                            <input type="number" id="a-${m.id}" class="score-input" placeholder="FT" value="${m.away_score ?? ''}">
                            <input type="number" id="ap-${m.id}" class="score-input" style="border-color:rgba(16,185,129,0.3)" placeholder="PK" value="${m.away_pen ?? ''}">
                        </div>
                    </div>
                    <button class="btn-primary" onclick="saveMatch(${m.id})">Commit Result</button>
                    <button class="btn-danger" onclick="resetMatch(${m.id})">Clear Node</button>
                </div>
            `).join('');

            // 3. Render Prediction Panels Safely
            document.getElementById('predict-grid').innerHTML = allMatches.map(m => `
                <div class="form-card">
                    <div class="match-id-badge" style="background:transparent; padding:0 0 8px 0; margin-bottom:8px;">${m.round_name}</div>
                    <div class="input-row"><span>${m.home_team || 'TBD'}</span><input type="number" id="ph-${m.id}" class="score-input"></div>
                    <div class="input-row"><span>${m.away_team || 'TBD'}</span><input type="number" id="pa-${m.id}" class="score-input"></div>
                    <button class="btn-primary" onclick="savePrediction(${m.id})">Lock Prediction</button>
                </div>
            `).join('');
        }

        async function saveMatch(id) {
            const h = document.getElementById(`h-${id}`).value;
            const a = document.getElementById(`a-${id}`).value;
            const hp = document.getElementById(`hp-${id}`).value;
            const ap = document.getElementById(`ap-${id}`).value;

            const data = {
                home_score: h !== '' ? parseInt(h) : null,
                away_score: a !== '' ? parseInt(a) : null,
                home_pen: hp !== '' ? parseInt(hp) : null,
                away_pen: ap !== '' ? parseInt(ap) : null
            };
            
            await db.from('matches').update(data).eq('id', id);
            await initializeApp();
        }

        async function resetMatch(id) {
            await db.from('matches').update({home_score:null, away_score:null, home_pen:null, away_pen:null}).eq('id', id);
            await initializeApp();
        }

        async function savePrediction(matchId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Input your player handler name.');
            
            const h = document.getElementById(`ph-${matchId}`).value;
            const a = document.getElementById(`pa-${matchId}`).value;
            if (h === '' || a === '') return alert('Ensure all prediction values are filled.');

            let winnerTeam = null;
            const targetMatch = allMatches.find(m => m.id === matchId);
            if (parseInt(h) > parseInt(a)) winnerTeam = targetMatch.home_team;
            if (parseInt(a) > parseInt(h)) winnerTeam = targetMatch.away_team;

            const data = {
                player_name: name,
                match_id: matchId,
                pred_home: parseInt(h),
                pred_away: parseInt(a),
                pred_winner: winnerTeam
            };
            
            await db.from('predictions').insert([data]);
            alert('Prediction secured inside data logs.');
        }

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
