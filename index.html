<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #0B0F19; 
            --card: rgba(22, 30, 49, 0.7); 
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(59, 130, 246, 0.5);
            --text-main: #F8FAFC; 
            --text-muted: #64748B;
            --accent: #2563EB; 
            --accent-glow: rgba(37, 99, 235, 0.4);
            --danger: #EF4444; 
            --winner-bg: rgba(16, 185, 129, 0.1);
            --winner-text: #10B981;
        }

        body { 
            font-family: 'Space Grotesk', system-ui, sans-serif; 
            background: radial-gradient(circle at 50% 0%, #1E2640 0%, var(--bg) 70%); 
            color: var(--text-main); 
            margin: 0; 
            min-height: 100vh;
        }

        .nav { 
            background: rgba(11, 15, 25, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.25rem; 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .tab { 
            cursor: pointer; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif;
            color: var(--text-muted); 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            position: relative;
            padding: 4px 8px;
        }
        
        .tab:hover { color: var(--text-main); }
        .tab.active { color: #FFFFFF; text-shadow: 0 0 10px var(--accent-glow); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -21px; left: 0; width: 100%; height: 3px; background: var(--accent); box-shadow: 0 -2px 10px var(--accent);
        }

        .container { max-width: 1400px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .bracket-wrapper { display: flex; gap: 2.5rem; overflow-x: auto; padding: 1rem 0; align-items: center; justify-content: flex-start; }
        .bracket-column { display: flex; flex-direction: column; gap: 2rem; min-width: 280px; flex: 1; }
        .column-header { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); text-align: center; margin-bottom: 0.5rem; }

        .match-card { background: var(--card); border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.3); overflow: hidden; }
        .match-id-badge { font-size: 0.7rem; color: var(--text-muted); padding: 6px 12px; background: rgba(0, 0, 0, 0.2); border-bottom: 1px solid var(--border); font-weight: bold; }

        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .team-row:last-child { border-bottom: none; }
        .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; display: flex; align-items: center; gap: 8px; }
        
        .score-display { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 6px; }
        .penalty-badge { font-size: 0.75rem; color: #A7F3D0; background: rgba(16, 185, 129, 0.2); padding: 1px 5px; border-radius: 4px; font-weight: 800; }
        .team-row.winner { background: var(--winner-bg); color: var(--winner-text); }

        .admin-section-title { font-family: 'Montserrat', sans-serif; margin-top: 5rem; border-top: 1px solid var(--border); padding-top: 3rem; font-size: 1.5rem; }
        .standard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 1.5rem; }
        
        .form-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; position: relative; transition: all 0.3s; }
        .form-card.locked { opacity: 0.6; background: rgba(15, 23, 42, 0.45); border-color: rgba(239, 68, 68, 0.2); }
        .form-card.saved-state { border-color: rgba(16, 185, 129, 0.3); }

        .match-locked-overlay { background: rgba(239, 68, 68, 0.15); border: 1px solid var(--danger); padding: 8px; border-radius: 6px; text-align: center; font-size: 0.75rem; color: var(--danger); font-weight: bold; margin-bottom: 12px; letter-spacing: 0.5px; }

        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-input { width: 45px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; text-align: center; background: rgba(0, 0, 0, 0.4); color: #FFFFFF; font-family: 'Montserrat', sans-serif; font-weight: 700; }
        .score-input:disabled { opacity: 0.4; cursor: not-allowed; }

        button { padding: 10px 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; transition: all 0.2s; margin-top: 8px; width: 100%; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover:not(:disabled) { background: #1d4ed8; }
        .btn-danger { background: transparent; color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); margin-top: 6px; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
        
        .lock-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--winner-text); font-weight: 700; font-size: 0.85rem; background: rgba(16, 185, 129, 0.15); padding: 8px; border-radius: 6px; cursor: pointer; margin-top: 8px; border: 1px solid rgba(16, 185, 129, 0.3); }
        .lock-indicator:hover { background: rgba(16, 185, 129, 0.25); }
        
        .draw-select-box { background: rgba(59, 130, 246, 0.1); border: 1px dashed var(--accent); padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .draw-btn { background: rgba(255,255,255,0.05); color: white; padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; margin: 4px; display: inline-block; width: auto; border: 1px solid var(--border); }
        .draw-btn.active { background: var(--winner-text); color: #000; font-weight: bold; border-color: var(--winner-text); box-shadow: 0 0 10px rgba(16, 185, 129, 0.4); }

        input[type="text"] { background: rgba(0, 0, 0, 0.4); border: 1px solid var(--border); padding: 12px; color: white; border-radius: 8px; width: 100%; max-width: 300px; font-family: inherit; font-size: 0.95rem; }
        input[type="text"]:focus { border-color: var(--accent); outline: none; }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; margin-top: 1rem; }
        .leaderboard-table th, .leaderboard-table td { padding: 14px; border-bottom: 1px solid var(--border); }
        .leaderboard-table th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .leaderboard-table tr:hover td { background: rgba(255,255,255,0.01); }
        
        .winner-flag-tag { background: rgba(245, 158, 11, 0.15); color: #F59E0B; padding: 2px 6px; border-radius: 4px; font-size: 0.65rem; font-weight: bold; margin-left: auto; border: 1px solid rgba(245, 158, 11, 0.3); display: inline-flex; align-items: center; gap: 3px; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="tab active" onclick="showTab('dashboard', this)">🏆 Bracket</div>
        <div class="tab" onclick="showTab('predict', this)">✍️ Predictions</div>
        <div class="tab" onclick="showTab('leaderboard', this)">📈 Leaderboard</div>
    </div>

    <!-- Bracket Section -->
    <div id="dashboard" class="container">
        <div class="bracket-wrapper" id="bracket-canvas"></div>
        <h2 class="admin-section-title">⚙️ Commissioner Tools</h2>
        <div class="standard-grid" id="admin-grid"></div>
    </div>

    <!-- Predictions Section -->
    <div id="predict" class="container" style="display:none">
        <h2>✍️ Submit Predictions</h2>
        <div style="margin-bottom: 2rem;">
            <input type="text" id="player-name" placeholder="Enter Player Name (Case-Sensitive)" oninput="loadUserPredictions()">
        </div>
        <div class="standard-grid" id="predict-grid"></div>
    </div>

    <!-- Leaderboard Section -->
    <div id="leaderboard" class="container" style="display:none">
        <h2>📈 Leaderboard Standings</h2>
        <div class="form-card" id="leaderboard-card"></div>
    </div>

    <script>
        // ==========================================
        // CONFIGURATION - INSERT YOUR SUPABASE VALUES
        // ==========================================
        const CONFIG_URL = 'https://yvkbmelrvdfdjlbanciv.supabase.co'; 
        const CONFIG_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0'; 
        
        const db = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
        
        let allMatches = [];
        let userPredictions = [];
        let internalDrawWinners = {}; 
        let adminDrawWinners = {};
        let unlockedPredictions = {}; 

        // National Flag mapping dictionary
        const flagMap = {
            "Argentina": "🇦🇷", "Brazil": "🇧🇷", "France": "🇫🇷", "Germany": "🇩🇪",
            "Italy": "🇮🇹", "Spain": "🇪🇸", "England": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Portugal": "🇵🇹",
            "Netherlands": "🇳🇱", "Belgium": "🇧🇪", "Croatia": "🇭🇷", "Uruguay": "🇺🇾",
            "Japan": "🇯🇵", "Morocco": "🇲🇦", "USA": "🇺🇸", "Mexico": "🇲🇽"
        };

        function getFlag(teamName) {
            if (!teamName) return '';
            return flagMap[teamName] || '🏳️';
        }

        function showTab(id, el) {
            document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
            document.getElementById('predict').style.display = (id === 'predict') ? 'block' : 'none';
            document.getElementById('leaderboard').style.display = (id === 'leaderboard') ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(id === 'leaderboard') calculateLeaderboard();
        }

        async function initializeApp() {
            const { data } = await db.from('matches').select('*').order('id');
            allMatches = data || [];
            renderUI();
        }

        async function loadUserPredictions() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) { 
                userPredictions = []; 
                renderUI(); 
                return; 
            }
            const { data } = await db.from('predictions').select('*').eq('player_name', name);
            userPredictions = data || [];
            renderUI();
        }

        function cleanMatchBlock(m) {
            const homeIsWinner = m.winner_team && m.winner_team === m.home_team;
            const awayIsWinner = m.winner_team && m.winner_team === m.away_team;
            return `
                <div class="match-card">
                    <div class="match-id-badge">MATCH ID ${m.id}</div>
                    <div class="team-row ${!m.home_team ? 'tbd' : ''} ${homeIsWinner ? 'winner' : ''}">
                        <span class="team-name">${getFlag(m.home_team)} ${m.home_team || 'TBD'}</span>
                        <span class="score-display">${m.home_score ?? '-'} ${m.home_pen !== null ? `<span class="penalty-badge">PK: ${m.home_pen}</span>` : ''}</span>
                    </div>
                    <div class="team-row ${!m.away_team ? 'tbd' : ''} ${awayIsWinner ? 'winner' : ''}">
                        <span class="team-name">${getFlag(m.away_team)} ${m.away_team || 'TBD'}</span>
                        <span class="score-display">${m.away_score ?? '-'} ${m.away_pen !== null ? `<span class="penalty-badge">PK: ${m.away_pen}</span>` : ''}</span>
                    </div>
                </div>
            `;
        }

        function setPredictDrawWinner(matchId, selectedTeam) {
            internalDrawWinners[matchId] = selectedTeam;
            renderUI();
        }

        function setAdminDrawWinner(matchId, selectedTeam) {
            adminDrawWinners[matchId] = selectedTeam;
            renderUI();
        }

        function unlockPredictionSlot(matchId) {
            unlockedPredictions[matchId] = true;
            renderUI();
        }

        function renderUI() {
            // Bracket Splitting
            const r16 = allMatches.filter(m => m.id >= 1 && m.id <= 8);
            const qf = allMatches.filter(m => m.id >= 9 && m.id <= 12);
            const sf = allMatches.filter(m => m.id >= 13 && m.id <= 14);
            const f = allMatches.filter(m => m.id === 15);
            const tp = allMatches.filter(m => m.id === 16);

            document.getElementById('bracket-canvas').innerHTML = `
                <div class="bracket-column"><div class="column-header">Round of 16</div>${r16.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Quarter Finals</div>${qf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Semi Finals</div>${sf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column">
                    <div class="column-header">Finals</div>${f.map(cleanMatchBlock).join('')}
                    <div class="column-header" style="margin-top: 2rem;">3rd Place</div>${tp.map(cleanMatchBlock).join('')}
                </div>
            `;

            // Admin Panels
            document.getElementById('admin-grid').innerHTML = allMatches.map(m => {
                let adminDrawHTML = '';
                const hVal = document.getElementById(`h-${m.id}`)?.value || (m.home_score ?? '');
                const aVal = document.getElementById(`a-${m.id}`)?.value || (m.away_score ?? '');
                
                if (hVal !== '' && aVal !== '' && parseInt(hVal) === parseInt(aVal) && m.home_team && m.away_team) {
                    const chosen = adminDrawWinners[m.id] || m.winner_team || '';
                    adminDrawHTML = `
                        <div class="draw-select-box" style="border-color: var(--danger); background: rgba(239,68,68,0.05)">
                            <small style="color:var(--danger); display:block; margin-bottom:4px; font-weight:bold;">Draw Outcome: Who advances?</small>
                            <button class="draw-btn ${chosen === m.home_team ? 'active' : ''}" onclick="setAdminDrawWinner(${m.id}, '${m.home_team}')">${m.home_team}</button>
                            <button class="draw-btn ${chosen === m.away_team ? 'active' : ''}" onclick="setAdminDrawWinner(${m.id}, '${m.away_team}')">${m.away_team}</button>
                        </div>
                    `;
                }

                return `
                    <div class="form-card ${m.home_score !== null ? 'saved-state' : ''}">
                        <div class="match-id-badge" style="background:transparent; padding:0 0 8px 0; margin-bottom:8px;">${m.round_name} (ID: ${m.id})</div>
                        <div class="input-row">
                            <span class="team-name">${getFlag(m.home_team)} ${m.home_team || 'TBD'}</span>
                            <div>
                                <input type="number" id="h-${m.id}" class="score-input" placeholder="FT" value="${hVal}" oninput="renderUI()">
                                <input type="number" id="hp-${m.id}" class="score-input" style="border-color:rgba(16,185,129,0.3)" placeholder="PK" value="${m.home_pen ?? ''}">
                            </div>
                        </div>
                        <div class="input-row">
                            <span class="team-name">${getFlag(m.away_team)} ${m.away_team || 'TBD'}</span>
                            <div>
                                <input type="number" id="a-${m.id}" class="score-input" placeholder="FT" value="${aVal}" oninput="renderUI()">
                                <input type="number" id="ap-${m.id}" class="score-input" style="border-color:rgba(16,185,129,0.3)" placeholder="PK" value="${m.away_pen ?? ''}">
                            </div>
                        </div>
                        ${adminDrawHTML}
                        <button class="btn-primary" onclick="saveMatch(${m.id})">Commit Result</button>
                        <button class="btn-danger" onclick="resetMatch(${m.id})">Clear Node</button>
                    </div>
                `;
            }).join('');

            // Predictions Panels
            document.getElementById('predict-grid').innerHTML = allMatches.map(m => {
                const existing = userPredictions.find(p => p.match_id === m.id);
                const isMatchStarted = m.home_score !== null; 
                const isLocked = (existing && !unlockedPredictions[m.id]) || isMatchStarted;
                
                let predictDrawHTML = '';
                const phVal = document.getElementById(`ph-${m.id}`)?.value || (existing ? existing.pred_home : '');
                const paVal = document.getElementById(`pa-${m.id}`)?.value || (existing ? existing.pred_away : '');

                if (!isLocked && phVal !== '' && paVal !== '' && parseInt(phVal) === parseInt(paVal) && m.home_team && m.away_team) {
                    const selected = internalDrawWinners[m.id] || (existing ? existing.pred_winner : '');
                    predictDrawHTML = `
                        <div class="draw-select-box">
                            <small style="color:var(--accent); display:block; margin-bottom:4px; font-weight:bold;">Draw Guess: Who qualifies?</small>
                            <button class="draw-btn ${selected === m.home_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.home_team}')">${m.home_team}</button>
                            <button class="draw-btn ${selected === m.away_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.away_team}')">${m.away_team}</button>
                        </div>
                    `;
                }

                const showHomeFlag = existing?.pred_winner === m.home_team && m.home_team;
                const showAwayFlag = existing?.pred_winner === m.away_team && m.away_team;

                return `
                    <div class="form-card ${isLocked ? 'locked' : ''} ${existing && !isLocked ? 'saved-state' : ''}">
                        <div class="match-id-badge" style="background:transparent; padding:0 0 8px 0; margin-bottom:8px;">${m.round_name}</div>
                        ${isMatchStarted ? '<div class="match-locked-overlay">⚠️ MATCH LOCKED: RESULT COMMITTED</div>' : ''}
                        
                        <div class="input-row">
                            <span class="team-name">
                                ${getFlag(m.home_team)} ${m.home_team || 'TBD'}
                                ${showHomeFlag ? '<span class="winner-flag-tag">🚩 Winner</span>' : ''}
                            </span>
                            <input type="number" id="ph-${m.id}" class="score-input" value="${phVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                        </div>
                        <div class="input-row">
                            <span class="team-name">
                                ${getFlag(m.away_team)} ${m.away_team || 'TBD'}
                                ${showAwayFlag ? '<span class="winner-flag-tag">🚩 Winner</span>' : ''}
                            </span>
                            <input type="number" id="pa-${m.id}" class="score-input" value="${paVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                        </div>
                        ${predictDrawHTML}
                        ${isLocked ? (isMatchStarted ? '' : `
                            <div class="lock-indicator" onclick="unlockPredictionSlot(${m.id})">🔒 Locked In (Click to Change)</div>
                        `) : `
                            <button class="btn-primary" onclick="savePrediction(${m.id})">Lock Prediction</button>
                        `}
                    </div>
                `;
            }).join('');
        }

        async function saveMatch(id) {
            const h = document.getElementById(`h-${id}`).value;
            const a = document.getElementById(`a-${id}`).value;
            const hp = document.getElementById(`hp-${id}`).value;
            const ap = document.getElementById(`ap-${id}`).value;

            if(h === '' || a === '') return alert('Please input score metrics.');

            let winner = null;
            const target = allMatches.find(m => m.id === id);
            if (parseInt(h) > parseInt(a)) winner = target.home_team;
            else if (parseInt(a) > parseInt(h)) winner = target.away_team;
            else {
                winner = adminDrawWinners[id] || target.winner_team;
                if (!winner) return alert('Provide advancing validation team for ties.');
            }

            const data = {
                home_score: parseInt(h),
                away_score: parseInt(a),
                home_pen: hp !== '' ? parseInt(hp) : null,
                away_pen: ap !== '' ? parseInt(ap) : null,
                winner_team: winner
            };
            
            await db.from('matches').update(data).eq('id', id);
            await initializeApp();
        }

        async function resetMatch(id) {
            await db.from('matches').update({home_score:null, away_score:null, home_pen:null, away_pen:null, winner_team:null}).eq('id', id);
            if(adminDrawWinners[id]) delete adminDrawWinners[id];
            await initializeApp();
        }

        async function savePrediction(matchId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Input your player handler name first.');
            
            const h = document.getElementById(`ph-${matchId}`).value;
            const a = document.getElementById(`pa-${matchId}`).value;
            if (h === '' || a === '') return alert('Ensure prediction slots contain parameters.');

            let winnerTeam = null;
            const targetMatch = allMatches.find(m => m.id === matchId);
            
            if (parseInt(h) > parseInt(a)) winnerTeam = targetMatch.home_team;
            else if (parseInt(a) > parseInt(h)) winnerTeam = targetMatch.away_team;
            else {
                winnerTeam = internalDrawWinners[matchId];
                if (!winnerTeam) {
                    const existing = userPredictions.find(p => p.match_id === matchId);
                    winnerTeam = existing ? existing.pred_winner : null;
                }
                if (!winnerTeam) return alert('For tied guesses, highlight your advancing qualifier.');
            }

            const payload = {
                player_name: name,
                match_id: matchId,
                pred_home: parseInt(h),
                pred_away: parseInt(a),
                pred_winner: winnerTeam
            };

            const existing = userPredictions.find(p => p.match_id === matchId);
            if (existing) {
                await db.from('predictions').update(payload).eq('id', existing.id);
            } else {
                await db.from('predictions').insert([payload]);
            }
            
            unlockedPredictions[matchId] = false;
            alert('Prediction secured securely.');
            await loadUserPredictions();
        }

        async function calculateLeaderboard() {
            const { data: preds } = await db.from('predictions').select('*');
            if(!preds) return;
            
            let standings = {};
            preds.forEach(p => {
                const match = allMatches.find(m => m.id === p.match_id);
                if (!match || match.home_score === null || match.away_score === null) return;
                
                if (!standings[p.player_name]) standings[p.player_name] = 0;
                
                const actualHome = match.home_score;
                const actualAway = match.away_score;
                const predHome = p.pred_home;
                const predAway = p.pred_away;
                
                const exactMatch = (actualHome === predHome && actualAway === predAway);
                
                let actualOutcome = 'draw';
                if (actualHome > actualAway) actualOutcome = 'home';
                if (actualAway > actualHome) actualOutcome = 'away';
                
                let predOutcome = 'draw';
                if (predHome > predAway) predOutcome = 'home';
                if (predAway > predHome) predOutcome = 'away';
                
                const correctOutcome = (actualOutcome === predOutcome);
                const correctWinner = (actualOutcome === 'draw') ? (match.winner_team === p.pred_winner) : correctOutcome;

                if (exactMatch) standings[p.player_name] += 3;
                else if (correctWinner) standings[p.player_name] += 1;
            });

            const sorted = Object.keys(standings).map(name => ({ name, points: standings[name] })).sort((a,b) => b.points - a.points);
            
            document.getElementById('leaderboard-card').innerHTML = `
                <table class="leaderboard-table">
                    <thead><tr><th>Rank</th><th>Player</th><th>Total Points</th></tr></thead>
                    <tbody>
                        ${sorted.length ? sorted.map((p, idx) => `<tr><td>#${idx+1}</td><td>${p.name}</td><td><strong>${p.points} pts</strong></td></tr>`).join('') : '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No computed calculation results ready yet.</td></tr>'}
                    </tbody>
                </table>
            `;
        }

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
