<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #F1F5F9; }
        .container { max-width: 800px; margin: 2rem auto; padding: 1rem; }
        .error { color: red; font-weight: bold; background: #fee; padding: 10px; border: 1px solid red; }
    </style>
</head>
<body>
    <div id="status" class="container"></div> <div id="bracket-grid" class="container"></div>

    <script>
        // 1. Double check these strings!
        const SUPABASE_URL = 'https://yvkbmelrvdfdjlbanciv.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0';

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadData() {
            const statusDiv = document.getElementById('status');
            try {
                const { data, error } = await supabase.from('matches').select('*').order('id');
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    statusDiv.innerHTML = "Connected, but no match data found. Run the SQL again.";
                    return;
                }

                document.getElementById('bracket-grid').innerHTML = data.map(m => `
                    <div style="background:white; padding:10px; margin:5px; border-radius:8px;">
                        ${m.round_name}: ${m.home_team || 'TBD'} vs ${m.away_team || 'TBD'}
                    </div>
                `).join('');
            } catch (e) {
                statusDiv.innerHTML = `<div class="error">Connection Failed: ${e.message}</div>`;
            }
        }

        loadData();
    </script>
</body>
</html>
