<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Bracket 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #F1F5F9; 
            --bg-gradient: linear-gradient(135deg, #F8FAFC 0%, #E2E8F0 100%);
            --card-dark: #1E293B; 
            --card-header: linear-gradient(90deg, #0F172A 0%, #1E293B 100%);
            --border: #334155;
            --border-active: #2563EB;
            --text-light: #F8FAFC; 
            --text-muted: #94A3B8;
            --accent: #3B82F6; 
            --accent-glow: rgba(59, 130, 246, 0.25);
            --danger: #EF4444; 
            --winner-bg: rgba(16, 185, 129, 0.15);
            --winner-text: #34D399;
            --warning: #F59E0B;
        }

        body { 
            font-family: 'Space Grotesk', system-ui, sans-serif; 
            background: var(--bg-gradient);
            color: #0F172A; 
            margin: 0; 
            min-height: 100vh;
        }

        .nav { 
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 1.25rem; 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            border-bottom: 2px solid #CBD5E1;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        
        .tab { 
            cursor: pointer; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif;
            color: #64748B; 
            transition: all 0.2s ease;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            position: relative;
            padding: 4px 8px;
        }
        
        .tab:hover { color: #0F172A; }
        .tab.active { color: var(--border-active); }
        .tab.active::after {
            content: ''; position: absolute; bottom: -21px; left: 0; width: 100%; height: 4px; background: var(--border-active); box-shadow: 0 -1px 10px rgba(37, 99, 235, 0.5);
        }

        .container { max-width: 1400px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .bracket-wrapper { display: flex; gap: 2.5rem; overflow-x: auto; padding: 1rem 0; align-items: center; justify-content: flex-start; }
        .bracket-column { display: flex; flex-direction: column; gap: 2rem; min-width: 280px; flex: 1; }
        .column-header { font-family: 'Montserrat', sans-serif; font-size: 0.85rem; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; color: #475569; text-align: center; margin-bottom: 0.5rem; }

        /* Ultra-Contrast Dark Card Strategy */
        .match-card { background: var(--card-dark); border-radius: 12px; border: 2px solid var(--border); box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.3); overflow: hidden; }
        .match-id-badge { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; color: #E2E8F0; padding: 10px 14px; background: var(--card-header); border-bottom: 2px solid var(--border); font-weight: 800; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; }

        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-light); }
        .team-row:last-child { border-bottom: none; }
        .team-row.tbd { color: var(--text-muted); font-weight: 500; }
        .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        
        .score-display { font-family: 'Montserrat', sans-serif; font-size: 1.1rem; display: inline-flex; align-items: center; gap: 6px; color: #FFFFFF; }
        .penalty-badge { font-size: 0.75rem; color: #A7F3D0; background: rgba(16, 185, 129, 0.25); padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(16, 185, 129, 0.4); }
        .team-row.winner { background: var(--winner-bg); color: var(--winner-text); }
        .team-row.winner .score-display { color: var(--winner-text); }

        .admin-section-title { font-family: 'Montserrat', sans-serif; margin-top: 5rem; border-top: 3px solid #CBD5E1; padding-top: 3rem; font-size: 1.75rem; color: #0F172A; }
        .standard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; }
        
        /* Interactive Input Cards */
        .form-card { background: var(--card-dark); border: 2px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 10px 25px -5px rgba(15, 23, 42, 0.25); }
        .form-card-body { padding: 1.5rem; }
        .form-card.locked { opacity: 0.85; background: #0F172A; border-color: #334155; }
        .form-card.saved-state { border-color: #10B981; box-shadow: 0 0 15px rgba(16, 185, 129, 0.2); }

        .match-locked-overlay { background: rgba(239, 68, 68, 0.15); border-bottom: 2px solid rgba(239, 68, 68, 0.4); padding: 10px; text-align: center; font-size: 0.75rem; color: #FCA5A5; font-weight: bold; letter-spacing: 0.5px; }
        .match-locked-overlay.awarded { background: rgba(16, 185, 129, 0.2); border-bottom-color: #10B981; color: #A7F3D0; }

        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; color: var(--text-light); font-weight: 700; }
        .score-input { width: 52px; padding: 8px 4px; border: 2px solid #475569; border-radius: 6px; text-align: center; background: #0F172A; color: #FFFFFF; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 1.05rem; }
        .score-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px var(--accent-glow); }
        .score-input:disabled { background: #1E293B; color: #64748B; cursor: not-allowed; border-color: #334155; }

        button { padding: 12px 14px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.8rem; transition: all 0.2s ease; margin-top: 8px; width: 100%; letter-spacing: 0.5px; }
        .btn-primary { background: var(--accent); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .btn-primary:hover:not(:disabled) { background: #2563EB; box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4); }
        .btn-danger { background: transparent; color: #F87171; border: 2px solid rgba(239, 68, 68, 0.3); margin-top: 10px; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }
        
        .lock-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; color: #60A5FA; font-weight: 700; font-size: 0.85rem; background: rgba(59, 130, 246, 0.15); padding: 10px; border-radius: 6px; cursor: pointer; margin-top: 8px; border: 2px solid rgba(59, 130, 246, 0.3); }
        .lock-indicator:hover { background: rgba(59, 130, 246, 0.25); }
        
        .draw-select-box { background: rgba(59, 130, 246, 0.1); border: 2px dashed #3B82F6; padding: 12px; border-radius: 8px; margin-bottom: 14px; text-align: center; }
        .draw-btn { background: #0F172A; color: #FFFFFF; padding: 8px 14px; border-radius: 6px; font-size: 0.75rem; margin: 4px; display: inline-block; width: auto; border: 2px solid #475569; font-weight: 700; cursor: pointer; }
        .draw-btn.active { background: var(--accent); color: #FFFFFF; border-color: var(--accent); box-shadow: 0 0 12px var(--accent-glow); }

        input[type="text"] { background: #FFFFFF; border: 2px solid #CBD5E1; padding: 14px 18px; color: #0F172A; border-radius: 8px; width: 100%; max-width: 320px; font-family: inherit; font-size: 1rem; font-weight: 700; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        input[type="text"]:focus { border-color: var(--border-active); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }
        
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th, .leaderboard-table td { padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .leaderboard-table th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 800; background: rgba(0,0,0,0.15); }
        .leaderboard-table tr:last-child td { border-bottom: none; }
        .leaderboard-table tr:hover td { background: rgba(255,255,255,0.02); }
        
        .winner-flag-tag { background: rgba(245, 158, 11, 0.2); color: #FBBF24; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; margin-left: auto; border: 1px solid rgba(245, 158, 11, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="tab active" onclick="showTab('dashboard', this)">Bracket</div>
        <div class="tab" onclick="showTab('predict', this)">Predictions</div>
        <div class="tab" onclick="showTab('leaderboard', this)">Leaderboard</div>
    </div>

    <div id="dashboard" class="container">
        <div class="bracket-wrapper" id="bracket-canvas"></div>
        <h2 class="admin-section-title">Commissioner Tools</h2>
        <div class="standard-grid" id="admin-grid"></div>
    </div>

    <div id="predict" class="container" style="display:none">
        <h2>Submit Predictions</h2>
        <div style="margin-bottom: 2.5rem;">
            <input type="text" id="player-name" placeholder="Enter Player Name (Case-Sensitive)" oninput="loadUserPredictions()">
        </div>
        <div class="standard-grid" id="predict-grid"></div>
    </div>

    <div id="leaderboard" class="container" style="display:none">
        <h2>Leaderboard Standings</h2>
        <div class="form-card" style="padding:0;" id="leaderboard-card"></div>
    </div>

    <script>
        const CONFIG_URL = 'https://yvkbmelrvdfdjlbanciv.supabase.co'; 
        const CONFIG_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0'; 
        
        const db = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
        
        let allMatches = [];
        let userPredictions = [];
        let internalDrawWinners = {}; 
        let unlockedPredictions = {}; 

        function showTab(id, el) {
            document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
            document.getElementById('predict').style.display = (id === 'predict') ? 'block' : 'none';
            document.getElementById('leaderboard').style.display = (id === 'leaderboard') ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(id === 'leaderboard') calculateLeaderboard();
            if(id === 'predict') renderUI(); 
        }

        async function initializeApp() {
            const { data } = await db.from('matches').select('*').order('id');
            allMatches = data || [];
            renderUI();
        }

        async function loadUserPredictions() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) { 
                userPredictions = []; 
                renderUI(); 
                return; 
            }
            const { data } = await db.from('predictions').select('*').eq('player_name', name);
            userPredictions = data || [];
            renderUI();
        }

        function cleanMatchBlock(m) {
            const homeIsWinner = m.winner_team && m.winner_team === m.home_team;
            const awayIsWinner = m.winner_team && m.winner_team === m.away_team;
            return `
                <div class="match-card">
                    <div class="match-id-badge"><span>MATCH ${m.id}</span><span style="font-size:0.65rem; opacity:0.7;">${m.round_name}</span></div>
                    <div class="team-row ${!m.home_team ? 'tbd' : ''} ${homeIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.home_team || 'TBD'}</span>
                        <span class="score-display">${m.home_score ?? '-'} ${m.home_pen !== null ? `<span class="penalty-badge">PK: ${m.home_pen}</span>` : ''}</span>
                    </div>
                    <div class="team-row ${!m.away_team ? 'tbd' : ''} ${awayIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.away_team || 'TBD'}</span>
                        <span class="score-display">${m.away_score ?? '-'} ${m.away_pen !== null ? `<span class="penalty-badge">PK: ${m.away_pen}</span>` : ''}</span>
                    </div>
                </div>
            `;
        }

        function setPredictDrawWinner(matchId, selectedTeam) {
            internalDrawWinners[matchId] = selectedTeam;
            renderUI();
        }

        function calculateMatchPoints(m, p) {
            if (!m || m.home_score === null || m.away_score === null || !p) return null;
            
            const actualHome = m.home_score;
            const actualAway = m.away_score;
            const predHome = p.pred_home;
            const predAway = p.pred_away;
            
            if (actualHome === predHome && actualAway === predAway) return 3;
            
            let actualOutcome = 'draw';
            if (actualHome > actualAway) actualOutcome = 'home';
            if (actualAway > actualHome) actualOutcome = 'away';
            
            let predOutcome = 'draw';
            if (predHome > predAway) predOutcome = 'home';
            if (predAway > predHome) predOutcome = 'away';
            
            if (actualOutcome === predOutcome) {
                if (actualOutcome === 'draw') {
                    return (m.winner_team === p.pred_winner) ? 1 : 0;
                }
                return 1;
            }
            return 0;
        }

        function renderUI() {
            const r16 = allMatches.filter(m => m.id >= 1 && m.id <= 8);
            const qf = allMatches.filter(m => m.id >= 9 && m.id <= 12);
            const sf = allMatches.filter(m => m.id >= 13 && m.id <= 14);
            const f = allMatches.filter(m => m.id === 15);
            const tp = allMatches.filter(m => m.id === 16);

            document.getElementById('bracket-canvas').innerHTML = `
                <div class="bracket-column"><div class="column-header">Round of 16</div>${r16.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Quarter Finals</div>${qf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column"><div class="column-header">Semi Finals</div>${sf.map(cleanMatchBlock).join('')}</div>
                <div class="bracket-column">
                    <div class="column-header">Finals</div>${f.map(cleanMatchBlock).join('')}
                    <div class="column-header" style="margin-top: 2rem;">3rd Place</div>${tp.map(cleanMatchBlock).join('')}
                </div>
            `;

            document.getElementById('admin-grid').innerHTML = allMatches.map(m => {
                const hVal = m.home_score ?? '';
                const aVal = m.away_score ?? '';
                return `
                    <div class="form-card ${m.home_score !== null ? 'saved-state' : ''}">
                        <div class="match-id-badge"><span>ID: ${m.id}</span><span>${m.round_name}</span></div>
                        <div class="form-card-body">
                            <div class="input-row">
                                <span class="team-name">${m.home_team || 'TBD'}</span>
                                <div>
                                    <input type="number" id="h-${m.id}" class="score-input" placeholder="FT" value="${hVal}">
                                    <input type="number" id="hp-${m.id}" class="score-input" style="border-color:#10B981" placeholder="PK" value="${m.home_pen ?? ''}">
                                </div>
                            </div>
                            <div class="input-row">
                                <span class="team-name">${m.away_team || 'TBD'}</span>
                                <div>
                                    <input type="number" id="a-${m.id}" class="score-input" placeholder="FT" value="${aVal}">
                                    <input type="number" id="ap-${m.id}" class="score-input" style="border-color:#10B981" placeholder="PK" value="${m.away_pen ?? ''}">
                                </div>
                            </div>
                            <button class="btn-primary" onclick="saveMatch(${m.id})">Commit Result</button>
                            <button class="btn-danger" onclick="resetMatch(${m.id})">Clear Node</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('predict-grid').innerHTML = allMatches.map(m => {
                const existing = userPredictions.find(p => p.match_id === m.id);
                const isMatchStarted = m.home_score !== null; 
                const isLocked = (existing && !unlockedPredictions[m.id]) || isMatchStarted;
                
                let lockBannerHTML = '';
                if (isMatchStarted) {
                    const pts = calculateMatchPoints(m, existing);
                    if (pts !== null) {
                        lockBannerHTML = `<div class="match-locked-overlay awarded">🏆 MATCH LOCKED (+${pts} PTS AWARDED)</div>`;
                    } else {
                        lockBannerHTML = '<div class="match-locked-overlay">⚠️ MATCH LOCKED: RESULT COMMITTED</div>';
                    }
                }

                let predictDrawHTML = '';
                const phVal = document.getElementById(`ph-${m.id}`)?.value || (existing ? existing.pred_home : '');
                const paVal = document.getElementById(`pa-${m.id}`)?.value || (existing ? existing.pred_away : '');

                if (!isLocked && phVal !== '' && paVal !== '' && parseInt(phVal) === parseInt(paVal) && m.home_team && m.away_team) {
                    const selected = internalDrawWinners[m.id] || (existing ? existing.pred_winner : '');
                    predictDrawHTML = `
                        <div class="draw-select-box">
                            <small style="color:#60A5FA; display:block; margin-bottom:6px; font-weight:bold;">Draw Guess: Who qualifies?</small>
                            <div class="draw-btn ${selected === m.home_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.home_team}')">${m.home_team}</div>
                            <div class="draw-btn ${selected === m.away_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.away_team}')">${m.away_team}</div>
                        </div>
                    `;
                }

                const showHomeFlag = existing?.pred_winner === m.home_team && m.home_team;
                const showAwayFlag = existing?.pred_winner === m.away_team && m.away_team;

                return `
                    <div class="form-card ${isLocked ? 'locked' : ''} ${existing && !isLocked ? 'saved-state' : ''}">
                        <div class="match-id-badge"><span>MATCH ${m.id}</span><span>${m.round_name}</span></div>
                        ${lockBannerHTML}
                        
                        <div class="form-card-body">
                            <div class="input-row">
                                <span class="team-name">
                                    ${m.home_team || 'TBD'}
                                    ${showHomeFlag ? '<span class="winner-flag-tag">Pick</span>' : ''}
                                </span>
                                <input type="number" id="ph-${m.id}" class="score-input" value="${phVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                            </div>
                            <div class="input-row">
                                <span class="team-name">
                                    ${m.away_team || 'TBD'}
                                    ${showAwayFlag ? '<span class="winner-flag-tag">Pick</span>' : ''}
                                </span>
                                <input type="number" id="pa-${m.id}" class="score-input" value="${paVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                            </div>
                            ${predictDrawHTML}
                            ${isLocked ? (isMatchStarted ? '' : `
                                <div class="lock-indicator" onclick="unlockedPredictions[${m.id}]=true; renderUI();">🔒 Locked In (Click to Change)</div>
                            `) : `
                                <button class="btn-primary" onclick="savePrediction(${m.id})">Lock Prediction</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function saveMatch(id) {
            const h = document.getElementById(`h-${id}`).value;
            const a = document.getElementById(`a-${id}`).value;
            const hp = document.getElementById(`hp-${id}`).value;
            const ap = document.getElementById(`ap-${id}`).value;

            if(h === '' || a === '') return alert('Please input score values.');

            let winner = null;
            const target = allMatches.find(m => m.id === id);
            
            if (parseInt(h) > parseInt(a)) {
                winner = target.home_team;
            } else if (parseInt(a) > parseInt(h)) {
                winner = target.away_team;
            } else {
                if (hp === '' || ap === '') return alert('Ties require penalty shootout (PK) scores to calculate who advances!');
                if (parseInt(hp) === parseInt(ap)) return alert('PK shootout metrics cannot end in a draw.');
                winner = (parseInt(hp) > parseInt(ap)) ? target.home_team : target.away_team;
            }

            const data = {
                home_score: parseInt(h),
                away_score: parseInt(a),
                home_pen: hp !== '' ? parseInt(hp) : null,
                away_pen: ap !== '' ? parseInt(ap) : null,
                winner_team: winner
            };
            
            await db.from('matches').update(data).eq('id', id);
            await initializeApp();
        }

        async function resetMatch(id) {
            await db.from('matches').update({home_score:null, away_score:null, home_pen:null, away_pen:null, winner_team:null}).eq('id', id);
            await initializeApp();
        }

        async function savePrediction(matchId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Input your tracking handler name.');
            
            const h = document.getElementById(`ph-${matchId}`).value;
            const a = document.getElementById(`pa-${matchId}`).value;
            if (h === '' || a === '') return alert('Ensure prediction value forms are completed.');

            let winnerTeam = null;
            const targetMatch = allMatches.find(m => m.id === matchId);
            
            if (parseInt(h) > parseInt(a)) winnerTeam = targetMatch.home_team;
            else if (parseInt(a) > parseInt(h)) winnerTeam = targetMatch.away_team;
            else {
                winnerTeam = internalDrawWinners[matchId];
                if (!winnerTeam) {
                    const existing = userPredictions.find(p => p.match_id === matchId);
                    winnerTeam = existing ? existing.pred_winner : null;
                }
                if (!winnerTeam) return alert('Highlight which team advances for tied scores.');
            }

            const payload = {
                player_name: name,
                match_id: matchId,
                pred_home: parseInt(h),
                pred_away: parseInt(a),
                pred_winner: winnerTeam
            };

            const existing = userPredictions.find(p => p.match_id === matchId);
            if (existing) {
                await db.from('predictions').update(payload).eq('id', existing.id);
            } else {
                await db.from('predictions').insert([payload]);
            }
            
            unlockedPredictions[matchId] = false;
            alert('Prediction locked.');
            await loadUserPredictions();
        }

        async function calculateLeaderboard() {
            const { data: preds } = await db.from('predictions').select('*');
            if(!preds) return;
            
            let standings = {};
            preds.forEach(p => {
                const match = allMatches.find(m => m.id === p.match_id);
                const pointsAwarded = calculateMatchPoints(match, p);
                if (pointsAwarded !== null) {
                    if (!standings[p.player_name]) standings[p.player_name] = 0;
                    standings[p.player_name] += pointsAwarded;
                }
            });

            const sorted = Object.keys(standings).map(name => ({ name, points: standings[name] })).sort((a,b) => b.points - a.points);
            
            document.getElementById('leaderboard-card').innerHTML = `
                <div class="match-id-badge" style="border-radius:10px 10px 0 0;"><span>GLOBAL STANDINGS</span><span>POINTS SUMMARY</span></div>
                <table class="leaderboard-table">
                    <thead><tr><th>Rank</th><th>Player</th><th>Total Points</th></tr></thead>
                    <tbody>
                        ${sorted.length ? sorted.map((p, idx) => `<tr><td style="color:var(--text-muted)">#${idx+1}</td><td><strong style="color:#FFF">${p.name}</strong></td><td><span style="color:var(--accent); font-weight:800">${p.points} pts</span></td></tr>`).join('') : '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No logs ready yet.</td></tr>'}
                    </tbody>
                </table>
            `;
        }

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
