<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup Tournament Bracket 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-base: #F4F6F9; 
            --bg-gradient: radial-gradient(circle at top right, #E0F2FE 0%, #F1F5F9 50%, #FAE8FF 100%);
            --card-dark: #111827; 
            --border: #374151;
            --text-light: #F9FAFB; 
            --text-muted: #9CA3AF;
            --accent-blue: #2563EB;
            --danger: #EF4444; 
            --winner-bg: rgba(16, 185, 129, 0.18);
            --winner-text: #34D399;
            
            /* World Cup Palette Array Gradients */
            --header-g1: linear-gradient(90deg, #059669 0%, #10B981 100%); /* Boston Green */
            --header-g2: linear-gradient(90deg, #7C3AED 0%, #EC4899 100%); /* Guadalajara Purple-Pink */
            --header-g3: linear-gradient(90deg, #2563EB 0%, #06B6D4 100%); /* New York Blue-Teal */
            --header-g4: linear-gradient(90deg, #EA580C 0%, #EAB308 100%); /* Miami Orange-Yellow */
        }

        body { 
            font-family: 'Space Grotesk', system-ui, sans-serif; 
            background: var(--bg-gradient);
            color: #111827; 
            margin: 0; 
            min-height: 100vh;
        }

        .nav { 
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(16px);
            padding: 1.25rem; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
            border-bottom: 3px solid #E2E8F0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
        }
        
        .tab { 
            cursor: pointer; 
            font-weight: 800; 
            font-family: 'Montserrat', sans-serif;
            color: #6B7280; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 1rem;
            letter-spacing: 0.5px;
            position: relative;
            padding: 6px 16px;
            border-radius: 30px;
        }
        
        .tab:hover { color: #111827; background: #F3F4F6; }
        .tab.active { color: #FFFFFF; background: var(--accent-blue); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }

        .container { max-width: 1400px; margin: 2.5rem auto; padding: 0 1.5rem; }

        .bracket-wrapper { display: flex; gap: 2.5rem; overflow-x: auto; padding: 1.5rem 0; align-items: center; justify-content: flex-start; }
        .bracket-column { display: flex; flex-direction: column; gap: 2.2rem; min-width: 290px; flex: 1; }
        .column-header { font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; color: #1F2937; text-align: center; margin-bottom: 0.5rem; background: #FFFFFF; padding: 8px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #E5E7EB; }

        /* Premium Dark High-Contrast Cards */
        .match-card { background: var(--card-dark); border-radius: 16px; border: 2px solid var(--border); box-shadow: 0 12px 30px -5px rgba(17, 24, 39, 0.3); overflow: hidden; transition: transform 0.2s ease; }
        .match-card:hover { transform: translateY(-2px); }
        
        /* Cycle Gradients per Card Class */
        .match-card.gc-0 .match-id-badge { background: var(--header-g1); }
        .match-card.gc-1 .match-id-badge { background: var(--header-g2); }
        .match-card.gc-2 .match-id-badge { background: var(--header-g3); }
        .match-card.gc-3 .match-id-badge { background: var(--header-g4); }

        .match-id-badge { font-family: 'Montserrat', sans-serif; font-size: 0.75rem; color: #FFFFFF; padding: 12px 16px; border-bottom: 2px solid var(--border); font-weight: 900; letter-spacing: 1px; display: flex; justify-content: space-between; align-items: center; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        .team-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; font-weight: 700; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-light); }
        .team-row:last-child { border-bottom: none; }
        .team-row.tbd { color: var(--text-muted); font-weight: 500; }
        .team-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; font-size: 1.05rem; }
        
        .score-display { font-family: 'Montserrat', sans-serif; font-size: 1.15rem; display: inline-flex; align-items: center; gap: 6px; color: #FFFFFF; }
        .penalty-badge { font-size: 0.75rem; color: #A7F3D0; background: rgba(16, 185, 129, 0.25); padding: 2px 6px; border-radius: 4px; font-weight: 800; border: 1px solid rgba(16, 185, 129, 0.4); }
        .team-row.winner { background: var(--winner-bg); color: var(--winner-text); }
        .team-row.winner .score-display { color: var(--winner-text); font-weight: 900; }

        .admin-section-title { font-family: 'Montserrat', sans-serif; margin-top: 5rem; border-top: 3px dashed #CBD5E1; padding-top: 3rem; font-size: 1.75rem; color: #111827; text-align: center; font-weight: 900; }
        .standard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 2rem; margin-top: 1.5rem; }
        
        /* Administrative & User Input Blocks */
        .form-card { background: var(--card-dark); border: 2px solid var(--border); border-radius: 16px; overflow: hidden; position: relative; transition: all 0.3s ease; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .form-card-body { padding: 1.5rem; }
        .form-card.locked { opacity: 0.9; background: #0B0F17; }
        .form-card.saved-state { border-color: #10B981; box-shadow: 0 0 20px rgba(16, 185, 129, 0.25); }

        /* Custom Cycle Gradients for Input Blocks */
        .form-card.gc-0 .match-id-badge { background: var(--header-g1); }
        .form-card.gc-1 .match-id-badge { background: var(--header-g2); }
        .form-card.gc-2 .match-id-badge { background: var(--header-g3); }
        .form-card.gc-3 .match-id-badge { background: var(--header-g4); }

        .match-locked-overlay { background: rgba(239, 68, 68, 0.15); border-bottom: 2px solid rgba(239, 68, 68, 0.4); padding: 12px; text-align: center; font-size: 0.8rem; color: #FCA5A5; font-weight: 800; letter-spacing: 0.5px; }
        .match-locked-overlay.awarded { background: rgba(16, 185, 129, 0.2); border-bottom-color: #10B981; color: #A7F3D0; }

        .input-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; color: var(--text-light); }
        .score-input { width: 52px; padding: 8px 4px; border: 2px solid #4B5563; border-radius: 8px; text-align: center; background: #1F2937; color: #FFFFFF; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 1.1rem; }
        .score-input:focus { border-color: #60A5FA; outline: none; box-shadow: 0 0 10px rgba(96, 165, 250, 0.5); }
        .score-input:disabled { background: #111827; color: #4B5563; cursor: not-allowed; border-color: #374151; }

        button { padding: 12px 14px; border-radius: 10px; border: none; font-weight: 800; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; transition: all 0.2s ease; margin-top: 8px; width: 100%; letter-spacing: 0.5px; text-transform: uppercase; }
        .btn-primary { background: var(--accent-blue); color: white; box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-primary:hover:not(:disabled) { background: #1D4ED8; transform: translateY(-1px); }
        .btn-danger { background: transparent; color: #F87171; border: 2px solid rgba(239, 68, 68, 0.4); margin-top: 10px; }
        .btn-danger:hover { background: rgba(239, 68, 68, 0.15); }
        
        .lock-indicator { display: flex; align-items: center; justify-content: center; gap: 6px; color: #60A5FA; font-weight: 800; font-size: 0.85rem; background: rgba(59, 130, 246, 0.15); padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 8px; border: 2px solid rgba(59, 130, 246, 0.3); }
        .lock-indicator:hover { background: rgba(59, 130, 246, 0.25); }
        
        .draw-select-box { background: rgba(59, 130, 246, 0.1); border: 2px dashed #3B82F6; padding: 12px; border-radius: 10px; margin-bottom: 14px; text-align: center; }
        .draw-btn { background: #1F2937; color: #FFFFFF; padding: 8px 14px; border-radius: 6px; font-size: 0.8rem; margin: 4px; display: inline-block; width: auto; border: 2px solid #4B5563; font-weight: 800; cursor: pointer; }
        .draw-btn.active { background: #3B82F6; color: #FFFFFF; border-color: #3B82F6; box-shadow: 0 0 12px rgba(59, 130, 246, 0.5); }

        input[type="text"] { background: #FFFFFF; border: 2px solid #CBD5E1; padding: 14px 18px; color: #111827; border-radius: 30px; width: 100%; max-width: 340px; font-family: inherit; font-size: 1rem; font-weight: 700; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        input[type="text"]:focus { border-color: var(--accent-blue); outline: none; box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15); }
        
        /* High-Contrast Gamified Leaderboard */
        .leaderboard-container-box { background: var(--card-dark); border-radius: 16px; border: 2px solid var(--border); overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .leaderboard-table { width: 100%; border-collapse: collapse; text-align: left; }
        .leaderboard-table th, .leaderboard-table td { padding: 18px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .leaderboard-table th { color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 900; background: rgba(0,0,0,0.25); }
        .leaderboard-table tr:last-child td { border-bottom: none; }
        .leaderboard-table tr:hover td { background: rgba(255,255,255,0.03); }
        
        /* Podium Styling */
        .podium-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; font-weight: 900; font-family: 'Montserrat', sans-serif; font-size: 0.85rem; }
        .podium-1 { background: #F59E0B; color: #111827; box-shadow: 0 0 10px rgba(245, 158, 11, 0.5); }
        .podium-2 { background: #94A3B8; color: #111827; box-shadow: 0 0 10px rgba(148, 163, 184, 0.5); }
        .podium-3 { background: #B45309; color: #FFFFFF; box-shadow: 0 0 10px rgba(180, 83, 9, 0.5); }

        .winner-flag-tag { background: rgba(245, 158, 11, 0.2); color: #FBBF24; padding: 2px 8px; border-radius: 4px; font-size: 0.65rem; font-weight: 800; margin-left: auto; border: 1px solid rgba(245, 158, 11, 0.4); text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="nav">
        <div class="tab active" onclick="showTab('dashboard', this)">Bracket Canvas</div>
        <div class="tab" onclick="showTab('predict', this)">My Predictions</div>
        <div class="tab" onclick="showTab('leaderboard', this)">Leaderboard Standings</div>
    </div>

    <div id="dashboard" class="container">
        <div class="bracket-wrapper" id="bracket-canvas"></div>
        <h2 class="admin-section-title">🏆 Match Control Centre</h2>
        <div class="standard-grid" id="admin-grid"></div>
    </div>

    <div id="predict" class="container" style="display:none">
        <h2 style="font-family:'Montserrat'; font-weight:900;">Lock In Predictions</h2>
        <div style="margin-bottom: 2.5rem;">
            <input type="text" id="player-name" placeholder="Enter Tracker Name (Case-Sensitive)" oninput="loadUserPredictions()">
        </div>
        <div class="standard-grid" id="predict-grid"></div>
    </div>

    <div id="leaderboard" class="container" style="display:none">
        <h2 style="font-family:'Montserrat'; font-weight:900; margin-bottom:1.5rem;">Live Ranking Standings</h2>
        <div class="leaderboard-container-box" id="leaderboard-card"></div>
    </div>

    <script>
        const CONFIG_URL = 'https://yvkbmelrvdfdjlbanciv.supabase.co'; 
        const CONFIG_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl2a2JtZWxydmRmZGpsYmFuY2l2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxNjM1ODksImV4cCI6MjA5ODczOTU4OX0.BP6DzEGRInduT3bueKlJRoJNGP9I4Pwk7HKxiBGF4A0'; 
        
        const db = window.supabase.createClient(CONFIG_URL, CONFIG_KEY);
        
        let allMatches = [];
        let userPredictions = [];
        let internalDrawWinners = {}; 
        let unlockedPredictions = {}; 

        function showTab(id, el) {
            document.getElementById('dashboard').style.display = (id === 'dashboard') ? 'block' : 'none';
            document.getElementById('predict').style.display = (id === 'predict') ? 'block' : 'none';
            document.getElementById('leaderboard').style.display = (id === 'leaderboard') ? 'block' : 'none';
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            if(id === 'leaderboard') calculateLeaderboard();
            if(id === 'predict') renderUI(); 
        }

        async function initializeApp() {
            const { data } = await db.from('matches').select('*').order('id');
            allMatches = data || [];
            renderUI();
        }

        async function loadUserPredictions() {
            const name = document.getElementById('player-name').value.trim();
            if (!name) { 
                userPredictions = []; 
                renderUI(); 
                return; 
            }
            const { data } = await db.from('predictions').select('*').eq('player_name', name);
            userPredictions = data || [];
            renderUI();
        }

        function cleanMatchBlock(m, index) {
            const homeIsWinner = m.winner_team && m.winner_team === m.home_team;
            const awayIsWinner = m.winner_team && m.winner_team === m.away_team;
            const styleClass = `gc-${index % 4}`;

            return `
                <div class="match-card ${styleClass}">
                    <div class="match-id-badge"><span>MATCH ${m.id}</span><span style="font-size:0.65rem; opacity:0.9; font-weight:800;">${m.round_name}</span></div>
                    <div class="team-row ${!m.home_team ? 'tbd' : ''} ${homeIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.home_team || 'TBD'}</span>
                        <span class="score-display">${m.home_score ?? '-'} ${m.home_pen !== null ? `<span class="penalty-badge">PK: ${m.home_pen}</span>` : ''}</span>
                    </div>
                    <div class="team-row ${!m.away_team ? 'tbd' : ''} ${awayIsWinner ? 'winner' : ''}">
                        <span class="team-name">${m.away_team || 'TBD'}</span>
                        <span class="score-display">${m.away_score ?? '-'} ${m.away_pen !== null ? `<span class="penalty-badge">PK: ${m.away_pen}</span>` : ''}</span>
                    </div>
                </div>
            `;
        }

        function setPredictDrawWinner(matchId, selectedTeam) {
            internalDrawWinners[matchId] = selectedTeam;
            renderUI();
        }

        function calculateMatchPoints(m, p) {
            if (!m || m.home_score === null || m.away_score === null || !p) return null;
            
            const actualHome = m.home_score;
            const actualAway = m.away_score;
            const predHome = p.pred_home;
            const predAway = p.pred_away;
            
            if (actualHome === predHome && actualAway === predAway) return 3;
            
            let actualOutcome = 'draw';
            if (actualHome > actualAway) actualOutcome = 'home';
            if (actualAway > actualHome) actualOutcome = 'away';
            
            let predOutcome = 'draw';
            if (predHome > predAway) predOutcome = 'home';
            if (predAway > predHome) predOutcome = 'away';
            
            if (actualOutcome === predOutcome) {
                if (actualOutcome === 'draw') {
                    return (m.winner_team === p.pred_winner) ? 1 : 0;
                }
                return 1;
            }
            return 0;
        }

        function renderUI() {
            const r16 = allMatches.filter(m => m.id >= 1 && m.id <= 8);
            const qf = allMatches.filter(m => m.id >= 9 && m.id <= 12);
            const sf = allMatches.filter(m => m.id >= 13 && m.id <= 14);
            const f = allMatches.filter(m => m.id === 15);
            const tp = allMatches.filter(m => m.id === 16);

            document.getElementById('bracket-canvas').innerHTML = `
                <div class="bracket-column"><div class="column-header">Round of 16</div>${r16.map((m, i) => cleanMatchBlock(m, i)).join('')}</div>
                <div class="bracket-column"><div class="column-header">Quarter Finals</div>${qf.map((m, i) => cleanMatchBlock(m, i)).join('')}</div>
                <div class="bracket-column"><div class="column-header">Semi Finals</div>${sf.map((m, i) => cleanMatchBlock(m, i)).join('')}</div>
                <div class="bracket-column">
                    <div class="column-header">Finals</div>${f.map((m, i) => cleanMatchBlock(m, i)).join('')}
                    <div class="column-header" style="margin-top: 2rem;">3rd Place Order</div>${tp.map((m, i) => cleanMatchBlock(m, i)).join('')}
                </div>
            `;

            document.getElementById('admin-grid').innerHTML = allMatches.map((m, idx) => {
                const hVal = m.home_score ?? '';
                const aVal = m.away_score ?? '';
                const styleClass = `gc-${idx % 4}`;

                return `
                    <div class="form-card ${styleClass} ${m.home_score !== null ? 'saved-state' : ''}">
                        <div class="match-id-badge"><span>MATCH ID: ${m.id}</span><span>${m.round_name}</span></div>
                        <div class="form-card-body">
                            <div class="input-row">
                                <span class="team-name">${m.home_team || 'TBD'}</span>
                                <div>
                                    <input type="number" id="h-${m.id}" class="score-input" placeholder="FT" value="${hVal}">
                                    <input type="number" id="hp-${m.id}" class="score-input" style="border-color:#10B981" placeholder="PK" value="${m.home_pen ?? ''}">
                                </div>
                            </div>
                            <div class="input-row">
                                <span class="team-name">${m.away_team || 'TBD'}</span>
                                <div>
                                    <input type="number" id="a-${m.id}" class="score-input" placeholder="FT" value="${aVal}">
                                    <input type="number" id="ap-${m.id}" class="score-input" style="border-color:#10B981" placeholder="PK" value="${m.away_pen ?? ''}">
                                </div>
                            </div>
                            <button class="btn-primary" onclick="saveMatch(${m.id})">Commit Result</button>
                            <button class="btn-danger" onclick="resetMatch(${m.id})">Clear Node</button>
                        </div>
                    </div>
                `;
            }).join('');

            document.getElementById('predict-grid').innerHTML = allMatches.map((m, idx) => {
                const existing = userPredictions.find(p => p.match_id === m.id);
                const isMatchStarted = m.home_score !== null; 
                const isLocked = (existing && !unlockedPredictions[m.id]) || isMatchStarted;
                const styleClass = `gc-${idx % 4}`;
                
                let lockBannerHTML = '';
                if (isMatchStarted) {
                    const pts = calculateMatchPoints(m, existing);
                    if (pts !== null) {
                        lockBannerHTML = `<div class="match-locked-overlay awarded">🏆 MATCH LOCKED (+${pts} PTS AWARDED)</div>`;
                    } else {
                        lockBannerHTML = '<div class="match-locked-overlay">⚠️ MATCH LOCKED: RESULT COMMITTED</div>';
                    }
                }

                let predictDrawHTML = '';
                const phVal = document.getElementById(`ph-${m.id}`)?.value || (existing ? existing.pred_home : '');
                const paVal = document.getElementById(`pa-${m.id}`)?.value || (existing ? existing.pred_away : '');

                if (!isLocked && phVal !== '' && paVal !== '' && parseInt(phVal) === parseInt(paVal) && m.home_team && m.away_team) {
                    const selected = internalDrawWinners[m.id] || (existing ? existing.pred_winner : '');
                    predictDrawHTML = `
                        <div class="draw-select-box">
                            <small style="color:#60A5FA; display:block; margin-bottom:6px; font-weight:900;">Who advances on penalties?</small>
                            <div class="draw-btn ${selected === m.home_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.home_team}')">${m.home_team}</div>
                            <div class="draw-btn ${selected === m.away_team ? 'active' : ''}" onclick="setPredictDrawWinner(${m.id}, '${m.away_team}')">${m.away_team}</div>
                        </div>
                    `;
                }

                const showHomeFlag = existing?.pred_winner === m.home_team && m.home_team;
                const showAwayFlag = existing?.pred_winner === m.away_team && m.away_team;

                return `
                    <div class="form-card ${styleClass} ${isLocked ? 'locked' : ''} ${existing && !isLocked ? 'saved-state' : ''}">
                        <div class="match-id-badge"><span>MATCH ${m.id}</span><span>${m.round_name}</span></div>
                        ${lockBannerHTML}
                        
                        <div class="form-card-body">
                            <div class="input-row">
                                <span class="team-name">
                                    ${m.home_team || 'TBD'}
                                    ${showHomeFlag ? '<span class="winner-flag-tag">Pick</span>' : ''}
                                </span>
                                <input type="number" id="ph-${m.id}" class="score-input" value="${phVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                            </div>
                            <div class="input-row">
                                <span class="team-name">
                                    ${m.away_team || 'TBD'}
                                    ${showAwayFlag ? '<span class="winner-flag-tag">Pick</span>' : ''}
                                </span>
                                <input type="number" id="pa-${m.id}" class="score-input" value="${paVal}" ${isLocked ? 'disabled' : ''} oninput="renderUI()">
                            </div>
                            ${predictDrawHTML}
                            ${isLocked ? (isMatchStarted ? '' : `
                                <div class="lock-indicator" onclick="unlockedPredictions[${m.id}]=true; renderUI();">🔒 Change Prediction</div>
                            `) : `
                                <button class="btn-primary" onclick="savePrediction(${m.id})">Lock Prediction</button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function saveMatch(id) {
            const h = document.getElementById(`h-${id}`).value;
            const a = document.getElementById(`a-${id}`).value;
            const hp = document.getElementById(`hp-${id}`).value;
            const ap = document.getElementById(`ap-${id}`).value;

            if(h === '' || a === '') return alert('Please input score values.');

            let winner = null;
            const target = allMatches.find(m => m.id === id);
            
            if (parseInt(h) > parseInt(a)) {
                winner = target.home_team;
            } else if (parseInt(a) > parseInt(h)) {
                winner = target.away_team;
            } else {
                if (hp === '' || ap === '') return alert('Ties require penalty shootout (PK) scores!');
                if (parseInt(hp) === parseInt(ap)) return alert('PK shootout scores cannot end in a draw.');
                winner = (parseInt(hp) > parseInt(ap)) ? target.home_team : target.away_team;
            }

            const data = {
                home_score: parseInt(h),
                away_score: parseInt(a),
                home_pen: hp !== '' ? parseInt(hp) : null,
                away_pen: ap !== '' ? parseInt(ap) : null,
                winner_team: winner
            };
            
            await db.from('matches').update(data).eq('id', id);
            await advanceNextRoundSlot(id, winner); 
            await initializeApp();
        }

        async function advanceNextRoundSlot(sourceId, winnerName) {
            const cascadeMap = {
                1: [9, 'home'],  2: [9, 'away'],
                3: [10, 'home'], 4: [10, 'away'],
                5: [11, 'home'], 6: [11, 'away'],
                7: [12, 'home'], 8: [12, 'away'],
                9: [13, 'home'], 10: [13, 'away'],
                11: [14, 'home'], 12: [14, 'away'],
                13: [15, 'home'], 14: [15, 'away']
            };
            if (cascadeMap[sourceId]) {
                const [nextMatchId, slot] = cascadeMap[sourceId];
                const updatePayload = {};
                updatePayload[`${slot}_team`] = winnerName;
                await db.from('matches').update(updatePayload).eq('id', nextMatchId);
            }
        }

        async function resetMatch(id) {
            await db.from('matches').update({home_score:null, away_score:null, home_pen:null, away_pen:null, winner_team:null}).eq('id', id);

            const cascadeMap = {
                1: [9, 'home'],  2: [9, 'away'],
                3: [10, 'home'], 4: [10, 'away'],
                5: [11, 'home'], 6: [11, 'away'],
                7: [12, 'home'], 8: [12, 'away'],
                9: [13, 'home'], 10: [13, 'away'],
                11: [14, 'home'], 12: [14, 'away'],
                13: [15, 'home'], 14: [15, 'away']
            };

            let currentId = id;
            while (cascadeMap[currentId]) {
                const [nextMatchId, slot] = cascadeMap[currentId];
                const updatePayload = {};
                updatePayload[`${slot}_team`] = null;
                updatePayload['home_score'] = null;
                updatePayload['away_score'] = null;
                updatePayload['winner_team'] = null;

                await db.from('matches').update(updatePayload).eq('id', nextMatchId);
                currentId = nextMatchId; 
            }

            await initializeApp();
        }

        async function savePrediction(matchId) {
            const name = document.getElementById('player-name').value.trim();
            if (!name) return alert('Input your tracking handler name.');
            
            const h = document.getElementById(`ph-${matchId}`).value;
            const a = document.getElementById(`pa-${matchId}`).value;
            if (h === '' || a === '') return alert('Ensure prediction scores are complete.');

            let winnerTeam = null;
            const targetMatch = allMatches.find(m => m.id === matchId);
            
            if (parseInt(h) > parseInt(a)) winnerTeam = targetMatch.home_team;
            else if (parseInt(a) > parseInt(h)) winnerTeam = targetMatch.away_team;
            else {
                winnerTeam = internalDrawWinners[matchId];
                if (!winnerTeam) {
                    const existing = userPredictions.find(p => p.match_id === matchId);
                    winnerTeam = existing ? existing.pred_winner : null;
                }
                if (!winnerTeam) return alert('Highlight which team advances for tied scores.');
            }

            const payload = {
                player_name: name,
                match_id: matchId,
                pred_home: parseInt(h),
                pred_away: parseInt(a),
                pred_winner: winnerTeam
            };

            const existing = userPredictions.find(p => p.match_id === matchId);
            if (existing) {
                await db.from('predictions').update(payload).eq('id', existing.id);
            } else {
                await db.from('predictions').insert([payload]);
            }
            
            unlockedPredictions[matchId] = false;
            await loadUserPredictions();
        }

        async function calculateLeaderboard() {
            const { data: preds } = await db.from('predictions').select('*');
            if(!preds) return;
            
            let standings = {};
            preds.forEach(p => {
                const match = allMatches.find(m => m.id === p.match_id);
                const pointsAwarded = calculateMatchPoints(match, p);
                if (pointsAwarded !== null) {
                    if (!standings[p.player_name]) standings[p.player_name] = 0;
                    standings[p.player_name] += pointsAwarded;
                }
            });

            const sorted = Object.keys(standings).map(name => ({ name, points: standings[name] })).sort((a,b) => b.points - a.points);
            
            let tableRows = '<tr><td colspan="3" style="text-align:center; color:var(--text-muted);">No points logged yet. Turn in predictions!</td></tr>';
            if (sorted.length) {
                tableRows = sorted.map((p, idx) => {
                    let badge = `#${idx + 1}`;
                    if (idx === 0) badge = `<span class="podium-badge podium-1">1</span>`;
                    if (idx === 1) badge = `<span class="podium-badge podium-2">2</span>`;
                    if (idx === 2) badge = `<span class="podium-badge podium-3">3</span>`;
                    
                    return `
                        <tr>
                            <td>${badge}</td>
                            <td><strong style="color:#FFF; font-size:1.1rem;">${p.name}</strong></td>
                            <td><span style="color:#3B82F6; font-weight:900; font-size:1.1rem;">${p.points} PTS</span></td>
                        </tr>
                    `;
                }).join('');
            }

            document.getElementById('leaderboard-card').innerHTML = `
                <div class="match-id-badge" style="background:linear-gradient(90deg, #7C3AED 0%, #2563EB 100%); padding:16px 24px;">
                    <span>🏆 GLOBAL WORLD CUP LEADERBOARD</span>
                    <span>LIVE SYNC ACTIVE</span>
                </div>
                <table class="leaderboard-table">
                    <thead><tr><th>Rank</th><th>Player</th><th>Score</th></tr></thead>
                    <tbody>${tableRows}</tbody>
                </table>
            `;
        }

        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
